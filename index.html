<!DOCTYPE html>
<html>
<head>
    <title>Bug Tracker</title>

    <style>
body {
    font-family: Arial;
    background: #f0f2f5;
    padding: 20px;
    display: flex;
    justify-content: center;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 350px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h1 {
    text-align: center;
}

input {
    padding: 10px;
    width: 70%;
}

button {
    padding: 10px;
    cursor: pointer;
}

li {
    margin-top: 10px;
    padding: 10px;
    background: #f9f9f9;
    border-radius: 5px;
    display: flex;
    justify-content: space-between;
}

/* ✅ MOBILE (correct place) */
@media (max-width: 500px) {

    h1 {
        font-size: 20px;
    }

    input {
        width: 100%;
        margin-bottom: 10px;
    }

    li {
        flex-direction: column;
        align-items: flex-start;
    }

    li button {
        width: 100%;
        margin-top: 5px;
    }
}
</style>

</head>

<body>

<div class="container">

<h1>Bug Tracker 🐞</h1>

<input type="text" id="bugInput" placeholder="Enter bug">
<button onclick="addBug()">Add Bug</button>
<button onclick="clearAll()">Clear All</button>

<ul id="bugList"></ul>

</div>

<script>
let bugs = [];

window.onload = function() {
    let savedBugs = localStorage.getItem("bugs");
    if (savedBugs) {
        bugs = JSON.parse(savedBugs);
        bugs.forEach(bug => displayBug(bug));
    }
};

function addBug() {
    let bugText = document.getElementById("bugInput").value;

    if (bugText === "") return;

    bugs.push(bugText);
    localStorage.setItem("bugs", JSON.stringify(bugs));

    displayBug(bugText);

    document.getElementById("bugInput").value = "";
}

function displayBug(bugText) {
    let li = document.createElement("li");

    let span = document.createElement("span");
    span.textContent = bugText;

    span.onclick = function() {
        if (span.style.textDecoration === "line-through") {
            span.style.textDecoration = "none";
        } else {
            span.style.textDecoration = "line-through";
        }
    };

    let editBtn = document.createElement("button");
    editBtn.textContent = "Edit";

    editBtn.onclick = function() {
        let newText = prompt("Edit bug:", span.textContent);
        if (newText) {
            span.textContent = newText;

            bugs = bugs.map(b => b === bugText ? newText : b);
            localStorage.setItem("bugs", JSON.stringify(bugs));
        }
    };

    let deleteBtn = document.createElement("button");
    deleteBtn.textContent = "Delete";

    deleteBtn.onclick = function() {
        li.remove();

        bugs = bugs.filter(b => b !== bugText);
        localStorage.setItem("bugs", JSON.stringify(bugs));
    };

    li.appendChild(span);
    li.appendChild(document.createTextNode(" "));
    li.appendChild(editBtn);
    li.appendChild(deleteBtn);

    document.getElementById("bugList").appendChild(li);
}

function clearAll() {
    bugs = [];
    localStorage.removeItem("bugs");
    document.getElementById("bugList").innerHTML = "";
}

document.getElementById("bugInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        addBug();
    }
});
</script>

</body>
</html>
